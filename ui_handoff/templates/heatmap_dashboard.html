<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Crowd Heatmap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: #f8fafc; color: #0f172a; }
        #wrap { display: flex; height: 100vh; }
        #map { flex: 7; }
        #panel { flex: 3; min-width: 320px; max-width: 460px; overflow-y: auto; padding: 16px; border-left: 1px solid #e2e8f0; background: #fff; }
        .card { margin-top: 12px; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; background: #f8fafc; }
        .muted { color: #475569; }
        .zone { display: flex; justify-content: space-between; gap: 8px; margin-top: 8px; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px 10px; background: #fff; }
        .pill { display: inline-block; border: 1px solid #bfdbfe; border-radius: 999px; padding: 4px 8px; font-weight: 700; background: #eff6ff; color: #1d4ed8; }
    </style>
</head>
<body>
<div id="wrap">
    <div id="map"></div>
    <div id="panel">
        <a href="/" style="text-decoration:none; color:#1d4ed8; font-weight:600;">← Back</a>
        <h2 style="margin:10px 0 0 0;">Modular Heatmap Dashboard</h2>
        <div class="muted">Config-driven zones. No hard-coded coordinates.</div>
        <div class="card">
            <strong>Status</strong>
            <div id="statusText" class="muted" style="margin-top:6px;">Initializing...</div>
            <div style="margin-top:8px;">
                <span class="pill" id="zoneCountPill">0 zones</span>
                <span class="pill" id="updatedAtPill">Waiting...</span>
            </div>
        </div>
        <div class="card">
            <strong>Zone Metrics</strong>
            <div id="zoneMetrics" style="margin-top:8px;"></div>
        </div>
        <div class="card">
            <strong>Warnings</strong>
            <div id="warnings" class="muted" style="margin-top:8px;">No warnings</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
const UI_CONFIG = {
    pollMs: 4000,
    heatmap: {
        radius: 35,
        blur: 25,
        maxZoom: 18,
        max: 1.0,
        minOpacity: 0.4
    }
};

let map = null;
let heatLayer = null;
let zonePolygonLayer = null;
let mappingConfig = null;

function avgCenterFromConfig(config) {
    const entries = Object.values(config.video_sources || {});
    if (!entries.length) return [23.5855, 58.4060];
    let lat = 0, lon = 0;
    for (const e of entries) {
        lat += Number(e.centroid[0]) || 0;
        lon += Number(e.centroid[1]) || 0;
    }
    return [lat / entries.length, lon / entries.length];
}

function renderZoneMetrics(zones) {
    const container = document.getElementById("zoneMetrics");
    container.innerHTML = "";
    if (!zones || !zones.length) {
        container.innerHTML = '<div class="muted">No zone metrics yet.</div>';
        return;
    }
    zones.forEach(z => {
        const row = document.createElement("div");
        row.className = "zone";
        row.innerHTML = `<div><strong>${z.display_name}</strong><div class="muted">${z.video_source_id}</div></div>
                         <div style="text-align:right;"><strong>${z.count}</strong><div class="muted">${Math.round(z.weight * 100)}% of ${z.max_capacity}</div></div>`;
        container.appendChild(row);
    });
}

function renderWarnings(warnings) {
    const el = document.getElementById("warnings");
    if (!warnings || !warnings.length) {
        el.textContent = "No warnings";
        return;
    }
    el.innerHTML = warnings.map(w => `${w.video_source_id}: ${w.message}`).join("<br/>");
}

function drawPolygonsFromConfig(config) {
    if (zonePolygonLayer) zonePolygonLayer.remove();
    zonePolygonLayer = L.layerGroup().addTo(map);
    const sources = config.video_sources || {};
    Object.entries(sources).forEach(([sourceId, meta]) => {
        const polygonBounds = meta.polygon_bounds;
        if (!polygonBounds || !Array.isArray(polygonBounds)) return;
        polygonBounds.forEach(ring => {
            if (!Array.isArray(ring) || ring.length < 3) return;
            const latLngs = ring.map(pair => [pair[1], pair[0]]);
            L.polygon(latLngs, { color: "#2563eb", weight: 2, fillOpacity: 0.1 })
                .bindPopup(`${meta.display_name} (${sourceId})`)
                .addTo(zonePolygonLayer);
        });
    });
}

async function pollHeatmap() {
    try {
        const res = await fetch("/api/v1/update-heatmap");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const payload = await res.json();
        const rawPoints = payload.heatmap_points || [];
        // Spread each centroid into nearby points so heatmap is visible
        const points = [];
        rawPoints.forEach(p => {
            const w = Math.max(p.weight, 0.1);
            points.push([p.lat, p.lon, w]);
            // Add spread points proportional to weight for density effect
            const spread = 0.0003;
            const count = Math.max(1, Math.round(w * 8));
            for (let i = 0; i < count; i++) {
                points.push([
                    p.lat + (Math.random() - 0.5) * spread,
                    p.lon + (Math.random() - 0.5) * spread,
                    w * 0.6
                ]);
            }
        });
        heatLayer.setLatLngs(points);
        renderZoneMetrics(payload.zones || []);
        renderWarnings(payload.warnings || []);
        document.getElementById("updatedAtPill").textContent = payload.updated_at || "Updated";
        document.getElementById("statusText").textContent = "Live polling active.";
    } catch (err) {
        document.getElementById("statusText").textContent = `Polling failed: ${err.message}`;
    }
}

async function init() {
    try {
        const cfgRes = await fetch("/api/v1/mapping-config");
        if (!cfgRes.ok) throw new Error(`Config fetch failed: HTTP ${cfgRes.status}`);
        mappingConfig = await cfgRes.json();
        const center = avgCenterFromConfig(mappingConfig);
        map = L.map("map").setView(center, 16);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "© OpenStreetMap contributors",
            maxZoom: 20
        }).addTo(map);
        heatLayer = L.heatLayer([], UI_CONFIG.heatmap).addTo(map);
        drawPolygonsFromConfig(mappingConfig);

        const zoneCount = Object.keys(mappingConfig.video_sources || {}).length;
        document.getElementById("zoneCountPill").textContent = `${zoneCount} zones`;
        document.getElementById("statusText").textContent = "Config loaded. Starting polling...";
        await pollHeatmap();
        setInterval(pollHeatmap, UI_CONFIG.pollMs);
    } catch (err) {
        document.getElementById("statusText").textContent = `Initialization failed: ${err.message}`;
    }
}

init();
</script>
</body>
</html>
