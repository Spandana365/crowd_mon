<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crowd Intelligence UI</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at top, #e0ecff 0%, #f7f9ff 45%, #eef3ff 100%);
            color: #0f172a;
        }
        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 24px;
        }
        .title {
            text-align: center;
            margin-bottom: 30px;
        }
        .title h1 {
            margin: 0;
            font-size: 40px;
        }
        .title p {
            margin-top: 10px;
            color: #334155;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 24px;
        }
        .card {
            background: #ffffff;
            border: 1px solid #dbe5ff;
            border-radius: 18px;
            box-shadow: 0 16px 32px rgba(30, 64, 175, 0.12);
            padding: 26px;
        }
        .card h2 {
            margin-top: 0;
            margin-bottom: 8px;
        }
        .card p {
            color: #334155;
            line-height: 1.55;
        }
        .sub-actions {
            display: grid;
            gap: 12px;
            margin-top: 18px;
        }
        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #2563eb;
            color: #2563eb;
            font-weight: 600;
            text-align: center;
            background: #eff6ff;
        }
        .btn:hover {
            background: #dbeafe;
        }
        .placeholder {
            margin-top: 14px;
            padding: 14px;
            border-radius: 12px;
            border: 1px dashed #94a3b8;
            background: #f8fafc;
            color: #475569;
        }
        @media (max-width: 900px) {
            .cards { grid-template-columns: 1fr; }
            .title h1 { font-size: 30px; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="title">
            <h1>Crowd Intelligence</h1>
            <p>Select your role to continue.</p>
        </div>

        <div class="cards">
            <section class="card">
                <h2>Event Organizer</h2>
                <p>Predict crowd and design the venue layout for an event.</p>
                <div class="sub-actions">
                    <a class="btn" href="/organizer">Continue as Organizer</a>
                </div>
            </section>

            <section class="card">
                <h2>Public User</h2>
                <p>View the monitoring dashboard for an event (choose from published events).</p>
                <div class="sub-actions">
                    <a class="btn" href="/public">Continue as Public</a>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
